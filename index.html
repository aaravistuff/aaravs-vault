<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarav's Vault — Web OS</title>
    
    <script src="/uv/uv.config.js"></script>
    <script src="/uv/uv.bundle.js"></script>

    <style>
        :root {
            --sidebar-bg: rgba(20, 18, 24, 0.85);
            --sidebar-border: rgba(255, 255, 255, 0.05);
            --card-bg: rgba(25, 23, 30, 0.65);
            --card-hover: rgba(255, 255, 255, 0.1);
            --accent-color: #ff7b00; 
            --arcade-yellow: #facc15; 
            --neon-purple: #c026d3;
            --neon-blue: #22d3ee;
            --text-main: #ffffff;
            --text-muted: #9aa0a6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            background: #000;
        }

        .wallpaper-bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .wallpaper-bg-container iframe {
            width: 100vw;
            height: 56.25vw;
            min-height: 100vh;
            min-width: 177.77vh; 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: brightness(0.35) contrast(1.1);
        }

        aside {
            width: 260px;
            min-width: 260px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--sidebar-border);
            display: flex;
            flex-direction: column;
            padding: 25px 15px;
            z-index: 200; 
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 35px;
            padding-left: 10px;
        }

        .brand-logo {
            font-size: 1.8rem;
            color: var(--accent-color);
            font-weight: bold;
        }

        .brand-title h1 {
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        .brand-title p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .nav-section {
            margin-bottom: 25px;
        }

        .section-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            padding-left: 10px;
            font-weight: 700;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            margin-bottom: 4px;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid var(--accent-color);
        }

        .sidebar-footer {
            margin-top: auto;
        }

        .btn-discord {
            display: block;
            text-align: center;
            background: rgba(88, 101, 242, 0.2);
            color: #5865F2;
            border: 1px solid rgba(88, 101, 242, 0.4);
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .workspace-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 40px;
        }

        .hub-center {
            text-align: center;
            width: 100%;
            max-width: 650px;
            margin-bottom: 45px;
        }

        .widget-clock {
            font-size: 3.5rem;
            font-weight: 400;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .widget-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 35px;
        }

        .search-container {
            width: 100%;
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 6px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .search-container input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 1.05rem;
            padding: 10px;
        }

        .app-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 700px;
        }

        .app-tile {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 110px;
            height: 110px;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 8px;
        }

        .app-tile:hover {
            transform: translateY(-5px);
            background: var(--card-hover);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .app-icon { font-size: 2.2rem; }
        .app-name { font-size: 0.8rem; color: var(--text-muted); text-align: center; }

        /* COOL NEON ARCADE */
        .arcade-view {
            display: none; 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0f;
            background-image: 
                radial-gradient(circle at 25% 25%, rgba(192, 38, 211, 0.18) 0%, transparent 60%),
                radial-gradient(circle at 75% 75%, rgba(34, 211, 238, 0.18) 0%, transparent 60%);
            padding: 40px;
            overflow-y: auto;
            z-index: 5;
        }

        .arcade-control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 4px solid #1a1a24;
            padding-bottom: 20px;
        }

        .arcade-header-title h2 {
            font-size: 2.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            background: linear-gradient(90deg, var(--arcade-yellow), var(--neon-purple), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(250, 204, 21, 0.7);
        }

        .arcade-search {
            background: rgba(22, 22, 31, 0.95);
            border: 2px solid #444;
            border-radius: 999px;
            padding: 14px 28px;
            width: 380px;
            color: white;
            outline: none;
            font-size: 1.05rem;
            box-shadow: 0 0 20px rgba(192, 38, 211, 0.4);
        }

        .arcade-search:focus {
            border-color: var(--arcade-yellow);
            box-shadow: 0 0 30px rgba(250, 204, 21, 0.6);
        }

        .arcade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 32px;
            max-width: 1450px;
        }

        .game-card {
            background: linear-gradient(145deg, #1a1a24, #111118);
            border: 2px solid #333;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            height: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .game-card:hover {
            transform: translateY(-20px) scale(1.06);
            border-color: var(--arcade-yellow);
            box-shadow: 0 0 55px rgba(250, 204, 21, 0.6);
        }

        .game-card .title {
            font-weight: 800;
            font-size: 1.35rem;
            color: #fff;
            margin: 18px 0 12px;
        }

        .btn-play-action {
            background: linear-gradient(90deg, #facc15, #fbbf24);
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1.05rem;
            letter-spacing: 2px;
            padding: 16px 32px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }

        .btn-play-action:hover {
            transform: scale(1.1);
            background: #fff;
            box-shadow: 0 0 25px #facc15;
        }

        .game-player-frame {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100; 
        }

        .game-player-frame iframe {
            width: 100%;
            height: calc(100% - 40px);
            border: none;
            background: #000;
        }

        .game-control-bar {
            height: 40px;
            background: #0d0d11;
            border-top: 2px solid #1e1e2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
        }

        .embed-credit {
            font-size: 0.75rem;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .embed-credit span { color: var(--arcade-yellow); }

        .close-arcade-btn {
            background: transparent;
            color: #ef4444;
            border: none;
            cursor: pointer;
            font-weight: 800;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="wallpaper-bg-container">
        <iframe src="https://www.youtube.com/embed/fKcF32dmcDk?autoplay=1&mute=1&loop=1&playlist=fKcF32dmcDk&controls=0&showinfo=0&rel=0&iv_load_policy=3&modestbranding=1&enablejsapi=1" allow="autoplay; encrypted-media" frameborder="0"></iframe>
    </div>

    <aside>
        <div class="brand">
            <div class="brand-logo">V</div>
            <div class="brand-title">
                <h1>Vault OS</h1>
                <p>Aarav's Hub</p>
            </div>
        </div>

        <div class="nav-section">
            <div class="section-label">Navigation</div>
            <div onclick="switchView('home')" id="nav-home" class="nav-item active"><span>🏠</span> Home Workspace</div>
            <div onclick="switchView('cinema')" id="nav-cinema" class="nav-item"><span>🎬</span> Cinema Hub</div>
            <div onclick="switchView('arcade')" id="nav-arcade" class="nav-item"><span>🕹️</span> Arcade Vault</div>
        </div>

        <div class="sidebar-footer">
            <a href="https://discord.com" target="_blank" class="btn-discord">Join Discord</a>
        </div>
    </aside>

    <main>
        <div class="game-player-frame" id="gameViewport">
            <iframe id="arcadeFrame" src="" allow="fullscreen" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-presentation allow-modals"></iframe>
            <div class="game-control-bar">
                <div class="embed-credit">VAULT ENGINE // <span>PROXIED MODE</span></div>
                <button class="close-arcade-btn" onclick="closeGameEngine()">✕ EXIT GAME</button>
            </div>
        </div>

        <div class="workspace-view" id="view-home-panel">
            <div class="hub-center">
                <div class="widget-clock" id="liveClock">Welcome</div>
                <div class="widget-subtitle">Your cinematic web dashboard portal</div>
                <form class="search-container" id="vaultSearchForm" onsubmit="handleVaultSearch(event)">
                    <input type="text" id="vaultSearchInput" placeholder="TikTok, Netflix, YouTube or search anything... (proxied)">
                </form>
            </div>

            <div class="app-grid">
                <a href="https://www.youtube.com" target="_blank" class="app-tile">
                    <div class="app-icon">📺</div><div class="app-name">YouTube</div>
                </a>
                <a onclick="launchProxiedTikTok()" class="app-tile" style="cursor:pointer;">
                    <div class="app-icon">🎵</div><div class="app-name">TikTok (Unblocked)</div>
                </a>
                <a href="https://www.discord.com" target="_blank" class="app-tile">
                    <div class="app-icon">💬</div><div class="app-name">Discord</div>
                </a>
                <a href="https://www.google.com" target="_blank" class="app-tile">
                    <div class="app-icon">🔍</div><div class="app-name">Google</div>
                </a>
                <a href="https://www.twitch.tv" target="_blank" class="app-tile">
                    <div class="app-icon">🔮</div><div class="app-name">Twitch</div>
                </a>
            </div>

            <div style="display:flex; gap:12px; margin-top:25px; justify-content:center; flex-wrap:wrap;">
                <button onclick="launchProxiedTikTok()" style="padding:10px 20px; background:#000; border:2px solid #ff7b00; color:white; border-radius:999px; font-weight:600; cursor:pointer;">🎵 TikTok Unblocked</button>
                <button onclick="proxySite('https://www.tiktokv.com')" style="padding:10px 20px; background:#000; border:2px solid #ff7b00; color:white; border-radius:999px; font-weight:600; cursor:pointer;">🎵 TikTok Mirror</button>
                <button onclick="proxySite('https://urlebird.com')" style="padding:10px 20px; background:#000; border:2px solid #ff7b00; color:white; border-radius:999px; font-weight:600; cursor:pointer;">📹 Urlebird</button>
            </div>
        </div>

        <div class="arcade-view" id="view-cinema-panel">
            <div class="arcade-control-header">
                <div class="arcade-header-title">
                    <h2>Cinema Hub Streaming</h2>
                </div>
            </div>
            <div class="arcade-grid">
                <a href="https://dulo.tv" target="_blank" style="text-decoration: none;">
                    <div class="game-card" style="height: 180px;">
                        <div class="title" style="font-size: 1.5rem;">🎬 DULO TV</div>
                        <button class="btn-play-action">Launch TV Stream</button>
                    </div>
                </a>
            </div>
        </div>

        <div class="arcade-view" id="view-arcade-panel">
            <div class="arcade-control-header">
                <div class="arcade-header-title">
                    <h2>CYBER <span>NEON VAULT</span></h2>
                </div>
                <input type="text" class="arcade-search" id="arcadeSearchInput" placeholder="Search any game..." oninput="filterArcadeLibrary()">
            </div>
            <div class="arcade-grid" id="dynamicArcadeGrid"></div>
        </div>
    </main>

    <script>
        // System Clock
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        document.getElementById('liveClock').innerText = days[new Date().getDay()];

        // Expanded Game Library
        const arcadeLibraryDatabase = [
            { name: "Retro Bowl", url: "https://pizzaedition.win/games/retrobowl/" },
            { name: "Slope", url: "https://pizzaedition.win/games/slope/" },
            { name: "Geometry Dash", url: "https://pizzaedition.win/games/geometry-dash/" },
            { name: "1v1.LOL", url: "https://pizzaedition.win/games/1v1-lol/" },
            { name: "Happy Wheels", url: "https://pizzaedition.win/games/happy-wheels/" },
            { name: "Subway Surfers", url: "https://pizzaedition.win/games/subway-surfers/" },
            { name: "Minecraft Classic", url: "https://pizzaedition.win/games/minecraft/" },
            { name: "Pizza Tower", url: "https://pizzaedition.win/games/pizza-tower/" },
            { name: "Bloxd.io", url: "https://www.snokido.com/game/bloxd-io" },
            { name: "Moto X3M", url: "https://www.snokido.com/game/moto-x3m" },
            { name: "Shadow Fight 2", url: "https://www.snokido.com/game/shadow-fight-2" },
            { name: "Melon Sandbox", url: "https://www.snokido.com/game/melon-sandbox" },
            { name: "Basket Random", url: "https://www.snokido.com/game/basket-random" },
            { name: "Fireboy & Watergirl", url: "https://www.snokido.com/game/fireboy-watergirl" },
            { name: "Friday Night Funkin'", url: "https://www.snokido.com/game/friday-night-funkin" },
            { name: "Granny", url: "https://playhop.com/app/259805" },
            { name: "Five Nights at Freddy's 2", url: "https://playhop.com/app/five-nights-at-freddys-2-185647" },
            { name: "FNAE", url: "https://fivenightsatepsteins.org/FNAE-HTML5-1.2.3/index.html?autostart=1", custom: true }
        ];

        function compileArcadeLibrary() {
            const grid = document.getElementById('dynamicArcadeGrid');
            grid.innerHTML = "";

            arcadeLibraryDatabase.forEach(game => {
                const action = game.custom 
                    ? `loadInternalGame('${game.url}')` 
                    : `proxySite('${game.url}')`;

                const cardHTML = `
                    <div class="game-card" data-name="${game.name.toLowerCase()}">
                        <div style="font-size: 3.5rem; margin: 20px 0;">🕹️</div>
                        <div class="title">${game.name}</div>
                        <button class="btn-play-action" onclick="${action}">PLAY NOW</button>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        function filterArcadeLibrary() {
            const query = document.getElementById('arcadeSearchInput').value.toLowerCase().trim();
            document.querySelectorAll('.game-card').forEach(card => {
                const name = card.getAttribute('data-name');
                card.style.display = (name && name.includes(query)) ? 'flex' : 'none';
            });
        }

        function proxySite(url) {
            if (typeof __uv$config !== 'undefined' && navigator.serviceWorker) {
                navigator.serviceWorker.register('/uv.sw.js', {
                    scope: __uv$config.prefix
                }).then(() => {
                    const proxied = __uv$config.prefix + __uv$config.encodeUrl(url);
                    loadInternalGame(proxied);
                }).catch(() => {
                    window.open(url, '_blank');
                });
            } else {
                window.open(url, '_blank');
            }
        }

        function launchProxiedTikTok() {
            const tiktokUrls = [
                "https://www.tiktok.com",
                "https://tiktok.com",
                "https://www.tiktokv.com",
                "https://urlebird.com",
                "https://vt.tiktok.com"
            ];
            let index = 0;
            const tryNext = () => {
                if (index >= tiktokUrls.length) {
                    alert("❌ All TikTok links blocked.\nTry typing a mirror in the search bar.");
                    return;
                }
                proxySite(tiktokUrls[index++]);
            };
            tryNext();
        }

        function loadInternalGame(sourceUrl) {
            document.getElementById('arcadeFrame').src = sourceUrl;
            document.getElementById('gameViewport').style.display = 'block';
        }

        function closeGameEngine() {
            document.getElementById('arcadeFrame').src = "";
            document.getElementById('gameViewport').style.display = 'none';
        }

        function switchView(target) {
            closeGameEngine();

            document.getElementById('view-home-panel').style.display = 'none';
            document.getElementById('view-cinema-panel').style.display = 'none';
            document.getElementById('view-arcade-panel').style.display = 'none';
            
            document.getElementById('nav-home').classList.remove('active');
            document.getElementById('nav-cinema').classList.remove('active');
            document.getElementById('nav-arcade').classList.remove('active');

            if(target === 'home') {
                document.getElementById('view-home-panel').style.display = 'flex';
                document.getElementById('nav-home').classList.add('active');
            } else if (target === 'cinema') {
                document.getElementById('view-cinema-panel').style.display = 'block';
                document.getElementById('nav-cinema').classList.add('active');
            } else if (target === 'arcade') {
                document.getElementById('view-arcade-panel').style.display = 'block';
                document.getElementById('nav-arcade').classList.add('active');
            }
        }

        function handleVaultSearch(event) {
            event.preventDefault();
            const input = document.getElementById('vaultSearchInput').value.trim();
            if (!input) return;

            const isUrl = input.match(/^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/) || input.startsWith('http');
            let targetUrl = input;

            if (isUrl) {
                if (!/^https?:\/\//i.test(input)) targetUrl = 'https://' + input;
            } else {
                targetUrl = 'https://duckduckgo.com/?q=' + encodeURIComponent(input);
            }

            proxySite(targetUrl);
        }

        window.onload = compileArcadeLibrary;
    </script>
</body>
</html>
