<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLARIS ONE — CYBER VAULT OS</title>
    
    <script src="/uv/uv.config.js"></script>
    <script src="/uv/uv.bundle.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&family=VT323&display=swap');

        :root {
            --neon-pink: #ff00ff;
            --neon-cyan: #00ffff;
            --neon-yellow: #ffff00;
            --neon-purple: #9d00ff;
            --arcade-yellow: #facc15;
            --bg-dark: #0a0a0f;
            --card-bg: rgba(15, 15, 30, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            color: #fff;
            height: 100vh;
            display: flex;
            overflow: hidden;
            background: var(--bg-dark);
            font-family: 'Orbitron', sans-serif;
            position: relative;
        }

        /* EPIC ANIMATED BACKGROUND */
        .wallpaper-bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -2;
            overflow: hidden;
            pointer-events: none;
        }

        .wallpaper-bg-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 30%, rgba(157, 0, 255, 0.15), transparent 60%),
                        radial-gradient(circle at 80% 70%, rgba(0, 255, 255, 0.15), transparent 60%);
            animation: nebulaPulse 25s infinite alternate ease-in-out;
            z-index: 1;
        }

        .wallpaper-bg-container iframe {
            width: 100vw;
            height: 100vh;
            filter: brightness(0.25) contrast(1.3) saturate(1.8);
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes nebulaPulse {
            0% { opacity: 0.6; }
            100% { opacity: 0.95; }
        }

        /* SCANLINES + GRID OVERLAY */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(
                transparent 0px,
                transparent 2px,
                rgba(0, 255, 255, 0.03) 2px,
                rgba(0, 255, 255, 0.03) 4px
            );
            pointer-events: none;
            z-index: 10;
            animation: scanline 4s linear infinite;
        }

        @keyframes scanline {
            0% { background-position: 0 0; }
            100% { background-position: 0 1000px; }
        }

        /* SIDEBAR - ULTRA CYBER */
        aside {
            width: 280px;
            background: linear-gradient(180deg, rgba(10,10,20,0.95), rgba(20,15,40,0.95));
            backdrop-filter: blur(20px);
            border-right: 2px solid var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            z-index: 200;
            position: relative;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 50px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(0,255,255,0.3);
        }

        .brand-logo {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px var(--neon-pink);
            animation: logoGlow 2s infinite alternate;
        }

        @keyframes logoGlow {
            from { text-shadow: 0 0 10px var(--neon-pink); }
            to { text-shadow: 0 0 40px var(--neon-cyan), 0 0 60px var(--neon-pink); }
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 18px;
            border-radius: 12px;
            margin-bottom: 8px;
            font-size: 1.05rem;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(157, 0, 255, 0.25);
            box-shadow: 0 0 25px var(--neon-purple);
            transform: translateX(12px);
            border-left: 5px solid var(--neon-cyan);
        }

        .nav-item::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 40%; height: 200%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-25deg);
            animation: shimmer 4s infinite;
        }

        @keyframes shimmer {
            100% { transform: translateX(400%); }
        }

        /* MAIN CONTENT */
        main {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-container {
            width: 100%;
            max-width: 720px;
            background: rgba(10,10,25,0.9);
            border: 3px solid var(--neon-cyan);
            border-radius: 9999px;
            padding: 12px 28px;
            box-shadow: 0 0 40px rgba(0,255,255,0.5),
                        inset 0 0 25px rgba(157,0,255,0.3);
            transition: all 0.4s;
        }

        .search-container:focus-within {
            box-shadow: 0 0 60px var(--neon-pink),
                        0 0 90px rgba(255,0,255,0.6);
            transform: scale(1.03);
        }

        .search-container input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1.25rem;
            font-family: 'VT323', monospace;
            letter-spacing: 1px;
        }

        /* ARCADE VAULT - FLASHY GRID */
        .arcade-view {
            background: #0a0a0f;
            padding: 40px;
            overflow-y: auto;
        }

        .arcade-header-title h2 {
            font-size: 3.2rem;
            font-weight: 900;
            letter-spacing: 6px;
            background: linear-gradient(90deg, #ffff00, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px currentColor;
        }

        .game-card {
            background: linear-gradient(145deg, #1a1a2e, #0f0f1f);
            border: 3px solid transparent;
            border-image: linear-gradient(45deg, var(--neon-yellow), var(--neon-pink)) 1;
            box-shadow: 0 0 25px rgba(250, 204, 21, 0.4);
            transition: all 0.4s ease;
        }

        .game-card:hover {
            transform: scale(1.08) rotate(2deg);
            box-shadow: 0 0 60px var(--neon-yellow),
                        0 0 90px var(--neon-pink);
            border-image: linear-gradient(45deg, var(--neon-cyan), var(--neon-pink)) 1;
        }

        .btn-play-action {
            background: linear-gradient(90deg, #facc15, #ff00ff);
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 0 25px #ffff00;
            transition: all 0.3s;
        }

        .btn-play-action:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px #ff00ff;
        }

        /* GAME FRAME */
        .game-player-frame iframe {
            box-shadow: 0 0 80px rgba(0,255,255,0.7);
        }

        /* PARTICLE CANVAS (extra flash) */
        #particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.35;
        }
    </style>
</head>
<body>

    <canvas id="particles"></canvas>

    <div class="wallpaper-bg-container">
        <iframe src="https://www.youtube.com/embed/fKcF32dmcDk?autoplay=1&mute=1&loop=1&playlist=fKcF32dmcDk&controls=0&showinfo=0&rel=0" allow="autoplay; encrypted-media" frameborder="0"></iframe>
    </div>

    <aside>
        <div class="brand">
            <div class="brand-logo">POLARIS</div>
            <div>
                <h1 style="font-size:1.6rem; letter-spacing:3px;">ONE</h1>
                <p style="color:#00ffff; font-size:0.85rem;">CYBER VAULT OS</p>
            </div>
        </div>

        <div class="nav-section" style="margin-bottom:30px;">
            <div onclick="switchView('home')" id="nav-home" class="nav-item active"><span style="font-size:1.4rem;">🏠</span> HOME WORKSPACE</div>
            <div onclick="switchView('cinema')" id="nav-cinema" class="nav-item"><span style="font-size:1.4rem;">🎥</span> CINEMA HUB</div>
            <div onclick="switchView('arcade')" id="nav-arcade" class="nav-item"><span style="font-size:1.4rem;">🕹️</span> ARCADE VAULT</div>
        </div>

        <div style="margin-top:auto;">
            <a href="https://discord.com" target="_blank" style="display:block; background:rgba(88,101,242,0.15); color:#5865F2; padding:16px; border-radius:12px; text-align:center; font-weight:700; border:2px solid #5865F2; text-decoration:none;">JOIN DISCORD</a>
        </div>
    </aside>

    <main>
        <!-- GAME VIEWPORT -->
        <div class="game-player-frame" id="gameViewport" style="display:none; background:#000;">
            <iframe id="arcadeFrame" src="" allow="fullscreen" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-presentation allow-modals" style="width:100%; height:calc(100% - 50px);"></iframe>
            <div style="height:50px; background:#111; display:flex; align-items:center; justify-content:space-between; padding:0 30px; border-top:3px solid #00ffff;">
                <div style="color:#00ffff; font-family:monospace;">POLARIS ENGINE // UNBLOCKED MODE</div>
                <button onclick="closeGameEngine()" style="background:#ff0066; color:white; border:none; padding:8px 24px; border-radius:8px; font-weight:900; cursor:pointer;">EXIT VAULT</button>
            </div>
        </div>

        <!-- HOME -->
        <div id="view-home-panel" class="workspace-view" style="display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; height:100%;">
            <div style="text-align:center; margin-bottom:60px;">
                <div id="liveClock" style="font-size:5rem; font-weight:900; letter-spacing:-4px; background:linear-gradient(90deg,#00ffff,#ff00ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">SATURDAY</div>
                <p style="font-size:1.4rem; color:#00ffff; margin-top:10px;">UNBLOCKED PROXY DASHBOARD</p>
            </div>

            <form class="search-container" onsubmit="handleVaultSearch(event)">
                <input type="text" id="vaultSearchInput" placeholder="PROXY SEARCH → TikTok, Netflix, Games, YouTube..." style="font-size:1.4rem;">
            </form>

            <div style="display:flex; gap:30px; margin-top:80px; flex-wrap:wrap; justify-content:center;">
                <a onclick="quickProxy('https://www.tiktok.com')" class="app-tile" style="cursor:pointer; width:130px; height:130px; background:rgba(20,20,40,0.9); border:3px solid #ff00ff; border-radius:20px; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:0.3s;">
                    <div style="font-size:3.5rem;">🎵</div>
                    <div style="margin-top:12px; font-weight:700;">TIKTOK</div>
                </a>
                <a onclick="quickProxy('https://www.netflix.com')" class="app-tile" style="cursor:pointer; width:130px; height:130px; background:rgba(20,20,40,0.9); border:3px solid #e50914; border-radius:20px; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:0.3s;">
                    <div style="font-size:3.5rem;">📺</div>
                    <div style="margin-top:12px; font-weight:700;">NETFLIX</div>
                </a>
                <!-- Add more as needed -->
            </div>
        </div>

        <!-- CINEMA + ARCADE (same as before but flashier) -->
        <div id="view-cinema-panel" class="arcade-view" style="display:none;">
            <div style="text-align:center; margin-bottom:40px;">
                <h2 style="font-size:3rem; background:linear-gradient(#ffff00,#ff00ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">CINEMA HUB</h2>
            </div>
            <div style="display:flex; justify-content:center;">
                <a href="https://dulo.tv" target="_blank" style="text-decoration:none;">
                    <div class="game-card" style="width:420px; padding:40px; text-align:center;">
                        <div style="font-size:4rem; margin-bottom:20px;">🎬</div>
                        <div style="font-size:2rem; margin:20px 0;">DULO TV</div>
                        <button class="btn-play-action" style="width:280px; padding:18px; font-size:1.1rem;">LAUNCH STREAM</button>
                    </div>
                </a>
            </div>
        </div>

        <div id="view-arcade-panel" class="arcade-view" style="display:none;">
            <div class="arcade-control-header">
                <div class="arcade-header-title">
                    <h2>ARCADE <span style="color:#ffff00;">VAULT</span></h2>
                </div>
                <input type="text" id="arcadeSearchInput" placeholder="SEARCH UNBLOCKED GAMES..." class="arcade-search" oninput="filterArcadeLibrary()" style="background:#111; border:3px solid #ffff00; color:white; padding:16px; font-size:1.1rem;">
            </div>
            <div class="arcade-grid" id="dynamicArcadeGrid"></div>
        </div>
    </main>

    <script>
        // Particles for extra flash
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 1.5 - 0.75;
                this.speedY = Math.random() * 1.5 - 0.75;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = '#00ffff';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00ffff';
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        function initParticles() {
            particles = [];
            for(let i = 0; i < 120; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let p of particles) {
                p.update();
                p.draw();
            }
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Clock + existing scripts
        const days = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
        document.getElementById('liveClock').innerText = days[new Date().getDay()];

        // Arcade Library (unchanged but flashier cards)
        const arcadeLibraryDatabase = [ /* your full list from before */ ];

        function compileArcadeLibrary() {
            const grid = document.getElementById('dynamicArcadeGrid');
            grid.innerHTML = "";
            arcadeLibraryDatabase.forEach(game => {
                let action = game.isCustom ? 
                    `loadInternalGame('${game.customUrl}')` : 
                    `window.open('https://pizzaedition.win/games/${game.folder}/', '_blank')`;

                const html = `
                    <div class="game-card" data-name="${game.name.toLowerCase()}" style="height:280px;">
                        <div style="height:140px; background:#111; margin:-20px -20px 15px; border-radius:12px 12px 0 0; display:flex; align-items:center; justify-content:center; font-size:4rem;">🕹️</div>
                        <div class="title" style="font-size:1.35rem; margin-bottom:15px;">${game.name}</div>
                        <button class="btn-play-action" onclick="${action}">PLAY NOW</button>
                    </div>`;
                grid.innerHTML += html;
            });
        }

        function filterArcadeLibrary() {
            const q = document.getElementById('arcadeSearchInput').value.toLowerCase();
            document.querySelectorAll('.game-card').forEach(c => {
                c.style.display = c.getAttribute('data-name').includes(q) ? 'flex' : 'none';
            });
        }

        function switchView(v) {
            document.querySelectorAll('.workspace-view, .arcade-view').forEach(el => el.style.display = 'none');
            document.getElementById(`view-${v}-panel`).style.display = v === 'home' ? 'flex' : 'block';
        }

        function loadInternalGame(url) {
            document.getElementById('arcadeFrame').src = url;
            document.getElementById('gameViewport').style.display = 'block';
        }

        function closeGameEngine() {
            document.getElementById('arcadeFrame').src = '';
            document.getElementById('gameViewport').style.display = 'none';
        }

        function handleVaultSearch(e) {
            e.preventDefault();
            let q = document.getElementById('vaultSearchInput').value.trim();
            if(!q) return;
            let target = q.startsWith('http') ? q : 'https://' + q;
            if (!q.match(/^https?:\/\//)) target = `https://duckduckgo.com/?q=${encodeURIComponent(q)}`;
            
            if (typeof __uv$config !== 'undefined') {
                navigator.serviceWorker.register('/uv.sw.js').then(() => {
                    const proxied = __uv$config.prefix + __uv$config.encodeUrl(target);
                    loadInternalGame(proxied);
                });
            } else {
                window.open(target, '_blank');
            }
        }

        function quickProxy(url) {
            if (typeof __uv$config !== 'undefined') {
                const proxied = __uv$config.prefix + __uv$config.encodeUrl(url);
                loadInternalGame(proxied);
            } else window.open(url, '_blank');
        }

        window.onload = () => {
            initParticles();
            animateParticles();
            compileArcadeLibrary();
        };
    </script>
</body>
</html>
