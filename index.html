<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarav's Vault — Web OS</title>
    <style>
        /* Root Settings & Theme Colors */
        :root {
            --sidebar-bg: rgba(20, 18, 24, 0.75);
            --sidebar-border: rgba(255, 255, 255, 0.05);
            --card-bg: rgba(25, 23, 30, 0.6);
            --card-hover: rgba(255, 255, 255, 0.08);
            --accent-color: #ff7b00; /* Warm orange accent */
            --text-main: #ffffff;
            --text-muted: #9aa0a6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            background: #000;
        }

        /* --- BACKGROUND LIVE WALLPAPER CONTAINER --- */
        .wallpaper-bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .wallpaper-bg-container iframe {
            width: 100vw;
            height: 56.25vw;
            min-height: 100vh;
            min-width: 177.77vh; 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: brightness(0.4) contrast(1.1);
        }

        /* --- LEFT SIDEBAR --- */
        aside {
            width: 260px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-right: 1px solid var(--sidebar-border);
            display: flex;
            flex-direction: column;
            padding: 25px 15px;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 35px;
            padding-left: 10px;
        }

        .brand-logo {
            font-size: 1.8rem;
            color: var(--accent-color);
            font-weight: bold;
        }

        .brand-title h1 {
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        .brand-title p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .nav-section {
            margin-bottom: 25px;
        }

        .section-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            padding-left: 10px;
            font-weight: 700;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            margin-bottom: 4px;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid var(--accent-color);
        }

        .sidebar-footer {
            margin-top: auto;
        }

        .btn-discord {
            display: block;
            text-align: center;
            background: rgba(88, 101, 242, 0.2);
            color: #5865F2;
            border: 1px solid rgba(88, 101, 242, 0.4);
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        /* --- MAIN DESKTOP WORKSPACE --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px;
            position: relative;
            overflow-y: auto; /* Allows scrolling through lists */
        }

        .hub-center {
            text-align: center;
            width: 100%;
            max-width: 650px;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        .widget-clock {
            font-size: 3rem;
            font-weight: 400;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .widget-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .search-container {
            width: 100%;
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 6px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .search-container input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 1.05rem;
            padding: 10px;
        }

        /* Group Headings */
        .grid-header {
            width: 100%;
            max-width: 900px;
            text-align: left;
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 30px 0 15px 0;
            color: var(--accent-color);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }

        .app-grid {
            display: flex;
            justify-content: flex-start;
            gap: 20px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 900px;
            margin-bottom: 20px;
        }

        .app-tile {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 110px;
            height: 110px;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 8px;
            cursor: pointer;
        }

        .app-tile:hover {
            transform: translateY(-5px);
            background: var(--card-hover);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .app-icon {
            font-size: 2rem;
        }

        .app-name {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            padding: 0 5px;
        }

        /* --- OVERLAY WINDOW PLAYER --- */
        .game-screen {
            position: fixed;
            top: 0;
            left: 260px; /* Aligns right next to the sidebar */
            width: calc(100% - 260px);
            height: 100%;
            background: #000;
            z-index: 20;
            display: none; 
            overflow: hidden;
        }

        .game-screen iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .close-game-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(239, 68, 68, 0.8);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            z-index: 21;
            font-size: 0.85rem;
            transition: background 0.2s;
        }

        .close-game-btn:hover {
            background: rgb(239, 68, 68);
        }
    </style>
</head>
<body>

    <div class="wallpaper-bg-container">
        <iframe src="https://www.youtube.com/embed/fKcF32dmcDk?autoplay=1&mute=1&loop=1&playlist=fKcF32dmcDk&controls=0&showinfo=0&rel=0&iv_load_policy=3&modestbranding=1" 
                allow="autoplay; encrypted-media" 
                frameborder="0">
        </iframe>
    </div>

    <aside>
        <div class="brand">
            <div class="brand-logo">V</div>
            <div class="brand-title">
                <h1>Vault OS</h1>
                <p>Aarav's Hub</p>
            </div>
        </div>

        <div class="nav-section">
            <div class="section-label">Entertainment</div>
            <div class="nav-item active" onclick="closeContent()"><span>🏠</span> Home</div>
            <a href="#cinema-sec" class="nav-item"><span>🎬</span> Cinema</a>
            <a href="#games-sec" class="nav-item"><span>🎮</span> Games</a>
        </div>

        <div class="nav-section">
            <div class="section-label">External links</div>
            <a href="https://youtube.com" target="_blank" class="nav-item"><span>📺</span> YouTube</a>
            <a href="https://discord.com" target="_blank" class="nav-item"><span>💬</span> Discord</a>
        </div>

        <div class="sidebar-footer">
            <a href="https://discord.com" target="_blank" class="btn-discord">Join Discord</a>
        </div>
    </aside>

    <main>
        
        <div class="game-screen" id="vaultViewerWindow">
            <button class="close-game-btn" onclick="closeContent()">✕ Close Window</button>
            <iframe id="viewerFrame" src=""></iframe>
        </div>

        <div class="hub-center">
            <div class="widget-clock" id="liveClock">Welcome</div>
            <div class="widget-subtitle">Your cinematic web dashboard portal</div>

            <form class="search-container" id="vaultSearchForm" onsubmit="handleVaultSearch(event)">
                <input type="text" id="vaultSearchInput" placeholder="Search the web or enter a URL...">
            </form>
        </div>

        <div class="grid-header" id="games-sec">Featured Games</div>
        <div class="app-grid">
            <div onclick="launchContent('https://play.pacman.com/')" class="app-tile">
                <div class="app-icon">🕹️</div>
                <div class="app-name">Pac-Man</div>
            </div>
            <div onclick="launchContent('https://classic.minecraft.net/')" class="app-tile">
                <div class="app-icon">🧱</div>
                <div class="app-name">Minecraft</div>
            </div>
            <div onclick="launchContent('https://www.google.com/logos/2010/pacman10-hp.html')" class="app-tile">
                <div class="app-icon">👾</div>
                <div class="app-name">Google Arcade</div>
            </div>
            <div onclick="launchContent('https://haxball.com/')" class="app-tile">
                <div class="app-icon">⚽</div>
                <div class="app-name">HaxBall</div>
            </div>
        </div>

        <div class="grid-header" id="cinema-sec">Cinema & Media</div>
        <div class="app-grid">
            <div onclick="launchContent('https://www.youtube.com/embed/aqz-KE-bpKQ')" class="app-tile">
                <div class="app-icon">🌌</div>
                <div class="app-name">4K Space Lo-Fi</div>
            </div>
            <div onclick="launchContent('https://www.youtube.com/embed/jfKfPfyJRdk')" class="app-tile">
                <div class="app-icon">🌿</div>
                <div class="app-name">Nature Relax</div>
            </div>
            <div onclick="launchContent('https://www.youtube.com/embed/live_stream?channel=UC4R8DWoMoI7CAwX8_LjQHig')" class="app-tile">
                <div class="app-icon">📰</div>
                <div class="app-name">Live Stream</div>
            </div>
        </div>

    </main>

    <script>
        // Set up the Live Day Tracker
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const currentDay = days[new Date().getDay()];
        document.getElementById('liveClock').innerText = currentDay;

        // Content Control Engine
        function launchContent(url) {
            const windowOverlay = document.getElementById('vaultViewerWindow');
            const iframe = document.getElementById('viewerFrame');
            
            iframe.src = url; 
            windowOverlay.style.display = 'block'; 
        }

        function closeContent() {
            const windowOverlay = document.getElementById('vaultViewerWindow');
            const iframe = document.getElementById('viewerFrame');
            
            iframe.src = ""; 
            windowOverlay.style.display = 'none'; 
        }

        // Smart Proxy / Search Input Logic
        function handleVaultSearch(event) {
            event.preventDefault();
            const input = document.getElementById('vaultSearchInput').value.trim();
            if (!input) return;

            const isUrl = input.match(/^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/) || input.startsWith('http');

            if (isUrl) {
                let finalUrl = input;
                if (!/^https?:\/\//i.test(input)) {
                    finalUrl = 'https://' + input;
                }
                launchContent(finalUrl); 
            } else {
                const searchUrl = 'https://duckduckgo.com/?q=' + encodeURIComponent(input);
                window.open(searchUrl, '_blank');
            }
        }
    </script>
</body>
</html>
