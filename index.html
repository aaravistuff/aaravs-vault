<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAULT OS — Aarav's Hub</title>
    
    <script src="/uv/uv.config.js"></script>
    <script src="/uv/uv.bundle.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');

        :root {
            --bg: #0f0f12;
            --accent: #d4af37;
            --text: #e0e0e0;
            --muted: #888888;
            --card: rgba(30, 30, 38, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }

        /* Elegant Background */
        .wallpaper-bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        .wallpaper-bg-container iframe {
            width: 100%; height: 100%;
            filter: brightness(0.4) contrast(1.1);
            object-fit: cover;
        }

        /* Bottom Navigation Bar */
        .bottom-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 75px;
            background: rgba(15, 15, 20, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            z-index: 300;
        }
        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text);
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s;
            padding: 8px 16px;
            border-radius: 12px;
        }
        .nav-btn:hover, .nav-btn.active {
            color: var(--accent);
            background: rgba(212, 175, 55, 0.1);
        }
        .nav-btn span { font-size: 1.6rem; margin-bottom: 4px; }

        /* Centered Sophisticated Search */
        .search-wrapper {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 620px;
            z-index: 250;
        }
        .search-container {
            background: rgba(25, 25, 32, 0.95);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 50px;
            padding: 14px 32px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            transition: all 0.4s ease;
        }
        .search-container:focus-within {
            border-color: var(--accent);
            box-shadow: 0 15px 50px rgba(212, 175, 55, 0.25);
        }
        .search-container input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 1.15rem;
            padding: 6px 0;
        }

        main {
            flex: 1;
            position: relative;
            overflow: hidden;
            padding-top: 110px;
            padding-bottom: 90px;
        }

        /* Views */
        .view {
            display: none;
            width: 100%;
            height: 100%;
            padding: 20px;
            overflow-y: auto;
        }
        .view.active { display: block; }

        /* Arcade Grid - Full & Centered */
        .arcade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 28px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .game-card {
            background: var(--card);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s ease;
            height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .btn-play-action {
            background: var(--accent);
            color: #111;
            font-weight: 600;
            padding: 14px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        /* Cinema - Full Screen Dulo */
        #cinema-content {
            max-width: 1100px;
            margin: 40px auto;
            text-align: center;
        }

        /* Game Frame */
        .game-player-frame {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 400;
        }
        .game-player-frame iframe {
            width: 100%; height: calc(100% - 60px);
        }
        .control-bar {
            height: 60px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="wallpaper-bg-container">
        <iframe src="https://www.youtube.com/embed/fKcF32dmcDk?autoplay=1&mute=1&loop=1&playlist=fKcF32dmcDk&controls=0&showinfo=0&rel=0" allow="autoplay; encrypted-media" frameborder="0"></iframe>
    </div>

    <!-- Cool Centered Search -->
    <div class="search-wrapper">
        <form class="search-container" onsubmit="handleVaultSearch(event)">
            <input type="text" id="vaultSearchInput" placeholder="Proxy search • TikTok, Netflix, YouTube, Games...">
        </form>
    </div>

    <main>
        <!-- Home View -->
        <div id="view-home" class="view active">
            <div style="text-align:center; padding-top:80px;">
                <h1 style="font-family:'Playfair Display', serif; font-size:4.2rem; letter-spacing:-2px; margin-bottom:16px;">Vault OS</h1>
                <p style="font-size:1.35rem; color:var(--muted);">Sophisticated. Unblocked. Yours.</p>
            </div>
        </div>

        <!-- Arcade View -->
        <div id="view-arcade" class="view">
            <div style="max-width:1400px; margin:0 auto;">
                <h2 style="text-align:center; font-size:2.4rem; margin-bottom:40px; color:var(--accent);">Arcade Vault</h2>
                <input type="text" id="arcadeSearchInput" placeholder="Search games..." 
                       style="width:100%; max-width:500px; margin:0 auto 40px; display:block; background:rgba(40,40,48,0.8); border:1px solid #444; border-radius:50px; padding:16px 24px; color:white; font-size:1.1rem;"
                       oninput="filterArcadeLibrary()">
                <div class="arcade-grid" id="dynamicArcadeGrid"></div>
            </div>
        </div>

        <!-- Cinema View -->
        <div id="view-cinema" class="view">
            <div id="cinema-content">
                <h2 style="font-size:2.8rem; margin-bottom:30px;">Cinema Hub</h2>
                <div onclick="loadCinema()" style="cursor:pointer; background:var(--card); border-radius:24px; padding:60px 40px; max-width:800px; margin:0 auto; transition:0.3s;">
                    <div style="font-size:6rem; margin-bottom:20px;">🎬</div>
                    <h3 style="font-size:2rem; margin:20px 0;">DULO TV</h3>
                    <button class="btn-play-action" style="padding:16px 48px; font-size:1.1rem;">Launch Stream</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
        <a onclick="switchView('home')" id="nav-home" class="nav-btn active"><span>🏠</span> Home</a>
        <a onclick="switchView('arcade')" id="nav-arcade" class="nav-btn"><span>🕹️</span> Arcade</a>
        <a onclick="switchView('cinema')" id="nav-cinema" class="nav-btn"><span>🎥</span> Cinema</a>
        <a href="https://discord.com" target="_blank" class="nav-btn"><span>💬</span> Discord</a>
    </div>

    <!-- Internal Player -->
    <div class="game-player-frame" id="gameViewport">
        <iframe id="arcadeFrame" src="" allow="fullscreen" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-presentation allow-modals"></iframe>
        <div class="control-bar">
            <div>VAULT OS • Unblocked Mode</div>
            <button onclick="closeGameEngine()" style="background:#c22; color:white; border:none; padding:10px 26px; border-radius:8px; cursor:pointer;">Close</button>
        </div>
    </div>

    <script>
        // Clock removed for clean look
        const arcadeLibraryDatabase = [ /* your full list from before - keeping all 50+ games */ 
            { id: "retrobowl", name: "Retro Bowl", folder: "retrobowl" },
            { id: "slope", name: "Slope", folder: "slope" },
            { id: "bitlife", name: "BitLife", folder: "bitlife" },
            { id: "geometrydash", name: "Geometry Dash", folder: "geometry-dash" },
            { id: "1v1lol", name: "1v1.LOL", folder: "1v1-lol" },
            { id: "tunnelrush", name: "Tunnel Rush", folder: "tunnel-rush" },
            { id: "drivemad", name: "Drive Mad", folder: "drive-mad" },
            { id: "driftboss", name: "Drift Boss", folder: "drift-boss" },
            { id: "run3", name: "Run 3", folder: "run-3" },
            { id: "happywheels", name: "Happy Wheels", folder: "happy-wheels" },
            { id: "subwaysurfers", name: "Subway Surfers", folder: "subway-surfers" },
            { id: "cookieclicker", name: "Cookie Clicker", folder: "cookie-clicker" },
            { id: "minecraft", name: "Minecraft Classic", folder: "minecraft" },
            { id: "eggycar", name: "Eggy Car", folder: "eggy-car" },
            { id: "smashkarts", name: "Smash Karts", folder: "smash-karts" },
            { id: "templerun2", name: "Temple Run 2", folder: "temple-run-2" },
            { id: "basketballstars", name: "Basketball Stars", folder: "basketball-stars" },
            { id: "stickmanhook", name: "Stickman Hook", folder: "stickman-hook" },
            { id: "clustertruck", name: "Clustertruck", folder: "clustertruck" },
            { id: "snowrider3d", name: "Snow Rider 3D", folder: "snow-rider-3d" },
            { id: "pizzatower", name: "Pizza Tower", folder: "pizza-tower" },
            { id: "vex7", name: "Vex 7", folder: "vex-7" },
            { id: "worldshardestgame", name: "World's Hardest Game", folder: "worlds-hardest-game" },
            { id: "crossyroad", name: "Crossy Road", folder: "crossy-road" },
            { id: "amongus", name: "Among Us", folder: "among-us" },
            { id: "badicecream", name: "Bad Ice Cream", folder: "bad-ice-cream" },
            { id: "badicecream2", name: "Bad Ice Cream 2", folder: "bad-ice-cream-2" },
            { id: "badicecream3", name: "Bad Ice Cream 3", folder: "bad-ice-cream-3" },
            { id: "bindingofisaac", name: "Binding of Isaac", folder: "binding-of-isaac" },
            { id: "bloonstd4", name: "Bloons TD 4", folder: "bloons-td-4" },
            { id: "bloonstd5", name: "Bloons TD 5", folder: "bloons-td-5" },
            { id: "bobtherobber", name: "Bob the Robber", folder: "bob-the-robber" },
            { id: "boxingrandom", name: "Boxing Random", folder: "boxing-random" },
            { id: "breakout", name: "Breakout", folder: "breakout" },
            { id: "burritobison", name: "Burrito Bison", folder: "burrito-bison" },
            { id: "catninja", name: "Cat Ninja", folder: "cat-ninja" },
            { id: "chess", name: "Chess", folder: "chess" },
            { id: "cubefield", name: "Cubefield", folder: "cubefield" },
            { id: "cuttherope", name: "Cut The Rope", folder: "cut-the-rope" },
            { id: "dealornodeal", name: "Deal or No Deal", folder: "deal-or-no-deal" },
            { id: "deathrun", name: "Death Run", folder: "death-run" },
            { id: "diepio", name: "Diep.io", folder: "diepio" },
            { id: "digdug", name: "Dig Dug", folder: "dig-dug" },
            { id: "dogeminer", name: "Doge Miner", folder: "doge-miner" },
            { id: "dogeminer2", name: "Doge Miner 2", folder: "doge-miner-2" },
            { id: "donkeykong", name: "Donkey Kong", folder: "donkey-kong" },
            { id: "doodlejump", name: "Doodle Jump", folder: "doodle-jump" },
            { id: "doom", name: "Doom", folder: "doom" },
            { id: "ducklife4", name: "Duck Life 4", folder: "duck-life-4" },
            { id: "elasticman", name: "Elastic Man", folder: "elastic-man" },
            { id: "escapetheprison", name: "Escaping the Prison", folder: "escaping-the-prison" },
            { id: "fnae", name: "Five Nights at Epstein's", folder: "CUSTOM_LINK", isCustom: true, customUrl: "https://fivenightsatepsteins.org/FNAE-HTML5-1.2.3/index.html?autostart=1" }
        ];

        function compileArcadeLibrary() {
            const grid = document.getElementById('dynamicArcadeGrid');
            grid.innerHTML = "";
            arcadeLibraryDatabase.forEach(game => {
                let action = game.isCustom ? 
                    `loadInternalGame('${game.customUrl}')` : 
                    `window.open('https://pizzaedition.win/games/${game.folder}/', '_blank')`;
                
                const card = `
                    <div class="game-card" data-name="${game.name.toLowerCase()}">
                        <div style="font-size:4.5rem; margin:20px 0;">🕹️</div>
                        <div style="font-weight:600; font-size:1.25rem; margin-bottom:20px;">${game.name}</div>
                        <button class="btn-play-action" onclick="${action}">Play Now</button>
                    </div>`;
                grid.innerHTML += card;
            });
        }

        function filterArcadeLibrary() {
            const q = document.getElementById('arcadeSearchInput').value.toLowerCase().trim();
            document.querySelectorAll('.game-card').forEach(card => {
                const name = card.getAttribute('data-name');
                card.style.display = name.includes(q) ? 'flex' : 'none';
            });
        }

        function switchView(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.add('active');

            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`nav-${view}`).classList.add('active');
        }

        function loadInternalGame(url) {
            document.getElementById('arcadeFrame').src = url;
            document.getElementById('gameViewport').style.display = 'block';
        }

        function loadCinema() {
            loadInternalGame('https://dulo.tv');
        }

        function closeGameEngine() {
            document.getElementById('arcadeFrame').src = "";
            document.getElementById('gameViewport').style.display = 'none';
        }

        function handleVaultSearch(e) {
            e.preventDefault();
            let input = document.getElementById('vaultSearchInput').value.trim();
            if (!input) return;

            let target = input.match(/^https?:\/\//i) ? input : 'https://' + input;
            if (!input.includes('.')) target = 'https://duckduckgo.com/?q=' + encodeURIComponent(input);

            if (typeof __uv$config !== 'undefined') {
                navigator.serviceWorker.register('/uv.sw.js').then(() => {
                    const proxied = __uv$config.prefix + __uv$config.encodeUrl(target);
                    loadInternalGame(proxied);
                }).catch(() => window.open(target, '_blank'));
            } else {
                window.open(target, '_blank');
            }
        }

        // Quick app shortcuts can be added to bottom bar if needed

        window.onload = () => {
            compileArcadeLibrary();
        };
    </script>
</body>
</html>
