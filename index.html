<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aarav's Vault</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* Custom Scrollbar for premium feel */
::-webkit-scrollbar {
    width: 8px;
}
::-webkit-scrollbar-track {
    background: #070707;
}
::-webkit-scrollbar-thumb {
    background: #222;
    border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
    background: #7c5cff;
}

body{
    font-family:'Poppins',sans-serif;
    background:#070707;
    color:white;
    overflow-x:hidden;
}

/* SIDEBAR SYSTEM */

.sidebar{
    width:260px;
    height:100vh;
    background:rgba(13, 13, 13, 0.65);
    backdrop-filter:blur(30px);
    -webkit-backdrop-filter:blur(30px);
    padding:40px 30px;
    position:fixed;
    left:0;
    top:0;
    border-right:1px solid rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    z-index: 10;
}

.logo{
    font-size:28px;
    font-weight:700;
    letter-spacing: -0.5px;
}

.logo span{
    color:#7c5cff;
    text-shadow: 0 0 20px rgba(124, 92, 255, 0.4);
}

.nav {
    margin-top: 40px;
    flex-grow: 1;
}

.nav-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #555;
    margin-bottom: 15px;
    display: block;
    font-weight: 600;
}

.nav a{
    display: flex;
    align-items: center;
    gap: 15px;
    color:#888;
    text-decoration:none;
    margin:12px 0;
    padding: 12px 16px;
    font-size:15px;
    font-weight: 500;
    border-radius: 12px;
    transition: all 0.3s ease;
}

.nav a.active, .nav a:hover{
    color:white;
    background: rgba(124, 92, 255, 0.15);
    border-left: 3px solid #7c5cff;
}

/* Premium Profile Widget at bottom of sidebar */
.user-profile {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.05);
}

.avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(45deg, #7c5cff, #b25cff);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

.user-info h4 {
    font-size: 14px;
    font-weight: 600;
}

.user-info p {
    font-size: 11px;
    color: #666;
}

/* MAIN PANEL WITH TOP NAV */

.main{
    margin-left:260px;
    width:calc(100% - 260px);
    min-height: 100vh;
    padding: 40px 60px;
    background: radial-gradient(circle at top right, rgba(124, 92, 255, 0.05), transparent 60%);
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
}

.search-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 12px 20px;
    border-radius: 30px;
    width: 350px;
    color: white;
    font-family: inherit;
    outline: none;
    transition: 0.3s;
}

.search-box:focus {
    border-color: #7c5cff;
    background: rgba(255,255,255,0.07);
    box-shadow: 0 0 15px rgba(124, 92, 255, 0.2);
}

/* SHOWCASE HERO BANNER */

.hero-banner{
    background: 
    linear-gradient(to right, #070707 20%, rgba(7,7,7,0.2) 80%),
    url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1974&auto=format&fit=crop');
    background-size: cover;
    background-position: center;
    border-radius: 24px;
    padding: 60px;
    border: 1px solid rgba(255,255,255,0.03);
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

.hero-text{
    max-width:550px;
}

.hero-text h1{
    font-size: 56px;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom:15px;
    letter-spacing: -1px;
}

.hero-text p{
    color:#aaa;
    font-size:16px;
    line-height:1.6;
    margin-bottom:30px;
}

/* PREMIUM ACTION BUTTONS */

.buttons{
    display:flex;
    gap:15px;
}

.btn{
    padding:14px 30px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    font-weight:600;
    font-size: 15px;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    cursor:pointer;
    display: inline-flex;
    align-items: center;
}

.primary{
    background:#7c5cff;
    box-shadow: 0 4px 20px rgba(124, 92, 255, 0.3);
}

.primary:hover {
    box-shadow: 0 6px 24px rgba(124, 92, 255, 0.5);
    background: #8b6fff;
}

.secondary{
    background:rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
}

.secondary:hover {
    background: rgba(255,255,255,0.12);
}

.btn:hover{
    transform:translateY(-3px);
}

/* CARDS MATRIX GRID */

.section{
    margin-top:60px;
}

.section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}

.section h2{
    font-size:24px;
    font-weight: 600;
    letter-spacing: -0.5px;
}

.see-all {
    color: #7c5cff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
}

.cards{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap:25px;
}

.card{
    background:rgba(20,20,20,0.4);
    border: 1px solid rgba(255,255,255,0.03);
    border-radius:20px;
    overflow:hidden;
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    cursor:pointer;
}

.card:hover{
    transform:translateY(-8px);
    border-color: rgba(124, 92, 255, 0.3);
    box-shadow: 0 15px 30px rgba(0,0,0,0.4);
}

.img-container {
    position: relative;
    width: 100%;
    height: 300px;
    overflow: hidden;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition: transform 0.6s ease;
}

.card:hover img {
    transform: scale(1.05);
}

.card-content{
    padding:16px;
}

.card-content h3{
    font-size: 16px;
    font-weight: 600;
    margin-bottom:6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.card-content p{
    color:#666;
    font-size:13px;
}

/* METRICS / STATS MINI COUNTERS */
.stats-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-top: 40px;
}

.stat-box {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.04);
    padding: 20px;
    border-radius: 16px;
}

.stat-box span {
    font-size: 12px;
    color: #555;
    text-transform: uppercase;
    font-weight: 600;
}

.stat-box h3 {
    font-size: 24px;
    margin-top: 5px;
    color: #fff;
}

/* OVERLAY BROWSER IFRAME PORTAL */
.browser-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: #000;
    z-index: 9999;
    flex-direction: column;
}

.browser-bar {
    background: #0d0d0d;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #1a1a1a;
}

.browser-title {
    font-weight: 600;
    color: #7c5cff;
}

.close-btn {
    background: rgba(255,255,255,0.05);
    color: white;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 8px 20px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.2s;
}

.close-btn:hover {
    background: #ff3b30;
    border-color: #ff3b30;
}

.browser-frame {
    width: 100%;
    flex: 1;
    border: none;
    background: #000;
}

/* FOOTER */

.footer{
    margin-top:80px;
    text-align:center;
    color:#444;
    font-size: 13px;
    padding-bottom:30px;
}

/* RESPONSIVE DESIGN */

@media(max-width:1100px){
    .main { padding: 30px; }
    .hero-banner { padding: 40px; }
}

@media(max-width:900px){
    .sidebar{
        width:100%;
        height:auto;
        position:relative;
        padding: 20px;
    }
    .nav { display: flex; flex-wrap: wrap; margin-top: 15px; }
    .nav a { margin: 5px; padding: 8px 12px; }
    .user-profile { display: none; }
    .main{
        margin-left:0;
        width: 100%;
        padding:20px;
    }
    .hero-banner { border-radius: 16
