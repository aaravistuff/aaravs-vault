<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarav's Vault — Web OS</title>
    
    <script src="/uv/uv.config.js"></script>
    <script src="/uv/uv.bundle.js"></script>

    <style>
        :root {
            --sidebar-bg: rgba(20, 18, 24, 0.85);
            --sidebar-border: rgba(255, 255, 255, 0.05);
            --card-bg: rgba(25, 23, 30, 0.65);
            --card-hover: rgba(255, 255, 255, 0.1);
            --accent-color: #ff7b00; 
            --arcade-yellow: #facc15; 
            --neon-purple: #c026d3;
            --neon-blue: #22d3ee;
            --text-main: #ffffff;
            --text-muted: #9aa0a6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            background: #000;
        }

        .wallpaper-bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .wallpaper-bg-container iframe {
            width: 100vw;
            height: 56.25vw;
            min-height: 100vh;
            min-width: 177.77vh; 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: brightness(0.35) contrast(1.1);
        }

        aside {
            width: 260px;
            min-width: 260px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--sidebar-border);
            display: flex;
            flex-direction: column;
            padding: 25px 15px;
            z-index: 200; 
        }

        main {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .workspace-view, .arcade-view {
            position: absolute;
            top: 0;
            left: 260px;
            right: 0;
            bottom: 0;
            padding: 40px;
            overflow-y: auto;
        }

        .workspace-view {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .hub-center {
            text-align: center;
            width: 100%;
            max-width: 650px;
            margin-bottom: 45px;
        }

        .search-container {
            width: 100%;
            max-width: 620px;
            margin: 0 auto 40px auto;
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 6px 20px;
            display: flex;
            align-items: center;
        }

        .app-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 700px;
        }

        .app-tile {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 110px;
            height: 110px;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            transition: all 0.2s;
        }

        .app-tile:hover {
            transform: translateY(-5px);
            background: var(--card-hover);
        }

        .arcade-view {
            display: none;
            background: #0a0a0f;
            background-image: 
                radial-gradient(circle at 25% 25%, rgba(192, 38, 211, 0.18) 0%, transparent 60%),
                radial-gradient(circle at 75% 75%, rgba(34, 211, 238, 0.18) 0%, transparent 60%);
        }

        .arcade-header-title h2 {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: 5px;
            background: linear-gradient(90deg, var(--arcade-yellow), var(--neon-purple), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .arcade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 28px;
        }

        .game-card {
            background: linear-gradient(145deg, #1a1a24, #111118);
            border: 2px solid #333;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            height: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            transition: all 0.4s;
        }

        .game-card:hover {
            transform: translateY(-20px) scale(1.06);
            border-color: var(--arcade-yellow);
        }

        .game-card .title {
            font-weight: 800;
            font-size: 1.35rem;
            color: #fff;
            margin: 18px 0 12px;
        }

        .btn-play-action {
            background: linear-gradient(90deg, #facc15, #fbbf24);
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1.05rem;
            padding: 16px 32px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .game-player-frame {
            display: none;
            position: absolute;
            top: 0;
            left: 260px;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 100; 
        }

        .game-player-frame iframe {
            width: 100%;
            height: calc(100% - 40px);
            border: none;
        }

        .game-control-bar {
            height: 40px;
            background: #0d0d11;
            border-top: 2px solid #1e1e2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
        }

        .close-arcade-btn {
            background: transparent;
            color: #ef4444;
            border: none;
            cursor: pointer;
            font-weight: 800;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="wallpaper-bg-container">
        <iframe src="https://www.youtube.com/embed/fKcF32dmcDk?autoplay=1&mute=1&loop=1&playlist=fKcF32dmcDk&controls=0&showinfo=0&rel=0&iv_load_policy=3&modestbranding=1&enablejsapi=1" allow="autoplay; encrypted-media" frameborder="0"></iframe>
    </div>

    <aside>
        <div class="brand">
            <div class="brand-logo">V</div>
            <div class="brand-title">
                <h1>Vault OS</h1>
                <p>Aarav's Hub</p>
            </div>
        </div>

        <div class="nav-section">
            <div class="section-label">Navigation</div>
            <div onclick="switchView('home')" id="nav-home" class="nav-item active"><span>🏠</span> Home Workspace</div>
            <div onclick="switchView('cinema')" id="nav-cinema" class="nav-item"><span>🎬</span> Cinema Hub</div>
            <div onclick="switchView('arcade')" id="nav-arcade" class="nav-item"><span>🕹️</span> Arcade Vault</div>
        </div>

        <div class="sidebar-footer">
            <a href="https://discord.com" target="_blank" class="btn-discord">Join Discord</a>
        </div>
    </aside>

    <main>
        <div class="game-player-frame" id="gameViewport">
            <iframe id="arcadeFrame" src="" allow="fullscreen" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-presentation allow-modals"></iframe>
            <div class="game-control-bar">
                <div class="embed-credit">VAULT ENGINE // <span>PROXIED MODE</span></div>
                <button class="close-arcade-btn" onclick="closeGameEngine()">✕ EXIT GAME</button>
            </div>
        </div>

        <div class="workspace-view" id="view-home-panel">
            <div class="hub-center">
                <div class="widget-clock" id="liveClock">Welcome</div>
                <div class="widget-subtitle">Your cinematic web dashboard portal</div>
                <form class="search-container" id="vaultSearchForm" onsubmit="handleVaultSearch(event)">
                    <input type="text" id="vaultSearchInput" placeholder="TikTok, Netflix, YouTube or search anything... (proxied)">
                </form>
            </div>

            <div class="app-grid">
                <a href="https://www.youtube.com" target="_blank" class="app-tile"><div class="app-icon">📺</div><div class="app-name">YouTube</div></a>
                <a onclick="launchProxiedTikTok()" class="app-tile" style="cursor:pointer;"><div class="app-icon">🎵</div><div class="app-name">TikTok</div></a>
                <a href="https://www.discord.com" target="_blank" class="app-tile"><div class="app-icon">💬</div><div class="app-name">Discord</div></a>
                <a href="https://www.google.com" target="_blank" class="app-tile"><div class="app-icon">🔍</div><div class="app-name">Google</div></a>
                <a href="https://www.twitch.tv" target="_blank" class="app-tile"><div class="app-icon">🔮</div><div class="app-name">Twitch</div></a>
            </div>
        </div>

        <div class="arcade-view" id="view-cinema-panel">
            <div class="arcade-control-header">
                <div class="arcade-header-title">
                    <h2>CINEMA HUB</h2>
                </div>
            </div>
            <div class="arcade-grid">
                <a href="https://dulo.tv" target="_blank" style="text-decoration: none;">
                    <div class="game-card" style="height: 180px;">
                        <div class="title" style="font-size: 1.5rem;">🎬 DULO TV</div>
                        <button class="btn-play-action">Launch Stream</button>
                    </div>
                </a>
            </div>
        </div>

        <div class="arcade-view" id="view-arcade-panel">
            <div class="arcade-control-header">
                <div class="arcade-header-title">
                    <h2>CYBER <span>NEON VAULT</span></h2>
                </div>
                <input type="text" class="arcade-search" id="arcadeSearchInput" placeholder="Search any game..." oninput="filterArcadeLibrary()">
            </div>
            <div class="arcade-grid" id="dynamicArcadeGrid"></div>
        </div>
    </main>

    <script>
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        document.getElementById('liveClock').innerText = days[new Date().getDay()];

        const arcadeLibraryDatabase = [
            { name: "Retro Bowl", url: "https://pizzaedition.win/games/retrobowl/" },
            { name: "Slope", url: "https://pizzaedition.win/games/slope/" },
            { name: "Geometry Dash", url: "https://pizzaedition.win/games/geometry-dash/" },
            { name: "1v1.LOL", url: "https://pizzaedition.win/games/1v1-lol/" },
            { name: "Polytrack", url: "https://www.snokido.com/game/polytrack" },
            { name: "Happy Wheels", url: "https://pizzaedition.win/games/happy-wheels/" },
            { name: "Subway Surfers", url: "https://pizzaedition.win/games/subway-surfers/" },
            { name: "Minecraft Classic", url: "https://pizzaedition.win/games/minecraft/" },
            { name: "Pizza Tower", url: "https://pizzaedition.win/games/pizza-tower/" },
            { name: "Bloxd.io", url: "https://www.snokido.com/game/bloxd-io" },
            { name: "Moto X3M", url: "https://www.snokido.com/game/moto-x3m" },
            { name: "Shadow Fight 2", url: "https://www.snokido.com/game/shadow-fight-2" },
            { name: "Basket Random", url: "https://www.snokido.com/game/basket-random" },
            { name: "Fireboy & Watergirl", url: "https://www.snokido.com/game/fireboy-watergirl" },
            { name: "Friday Night Funkin'", url: "https://www.snokido.com/game/friday-night-funkin" },
            { name: "Granny", url: "https://playhop.com/app/259805" },
            { name: "Five Nights at Freddy's", url: "https://playhop.com/app/five-nights-at-freddys-2-185647" },
            { name: "FNAE", url: "https://fivenightsatepsteins.org/FNAE-HTML5-1.2.3/index.html?autostart=1", custom: true },
            { name: "Tunnel Rush", url: "https://pizzaedition.win/games/tunnel-rush/" },
            { name: "Drive Mad", url: "https://pizzaedition.win/games/drive-mad/" },
            { name: "Drift Boss", url: "https://pizzaedition.win/games/drift-boss/" },
            { name: "Run 3", url: "https://pizzaedition.win/games/run-3/" },
            { name: "Cookie Clicker", url: "https://pizzaedition.win/games/cookie-clicker/" },
            { name: "Eggy Car", url: "https://pizzaedition.win/games/eggy-car/" },
            { name: "Smash Karts", url: "https://pizzaedition.win/games/smash-karts/" },
            { name: "Temple Run 2", url: "https://pizzaedition.win/games/temple-run-2/" },
            { name: "Basketball Stars", url: "https://pizzaedition.win/games/basketball-stars/" },
            { name: "Stickman Hook", url: "https://pizzaedition.win/games/stickman-hook/" },
            { name: "Clustertruck", url: "https://pizzaedition.win/games/clustertruck/" },
            { name: "Snow Rider 3D", url: "https://pizzaedition.win/games/snow-rider-3d/" },
            { name: "Vex 7", url: "https://pizzaedition.win/games/vex-7/" },
            { name: "World's Hardest Game", url: "https://pizzaedition.win/games/worlds-hardest-game/" },
            { name: "Crossy Road", url: "https://pizzaedition.win/games/crossy-road/" },
            { name: "Among Us", url: "https://pizzaedition.win/games/among-us/" }
        ];

        function compileArcadeLibrary() {
            const grid = document.getElementById('dynamicArcadeGrid');
            grid.innerHTML = "";

            arcadeLibraryDatabase.forEach(game => {
                const action = game.custom ? `loadInternalGame('${game.url}')` : `proxySite('${game.url}')`;
                const cardHTML = `
                    <div class="game-card" data-name="${game.name.toLowerCase()}">
                        <div style="font-size: 3.5rem; margin: 20px 0;">🕹️</div>
                        <div class="title">${game.name}</div>
                        <button class="btn-play-action" onclick="${action}">PLAY NOW</button>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        function filterArcadeLibrary() {
            const query = document.getElementById('arcadeSearchInput').value.toLowerCase().trim();
            document.querySelectorAll('.game-card').forEach(card => {
                const name = card.getAttribute('data-name');
                card.style.display = (name && name.includes(query)) ? 'flex' : 'none';
            });
        }

        function proxySite(url) {
            if (typeof __uv$config !== 'undefined' && navigator.serviceWorker) {
                navigator.serviceWorker.register('/uv.sw.js', { scope: __uv$config.prefix }).then(() => {
                    const proxied = __uv$config.prefix + __uv$config.encodeUrl(url);
                    loadInternalGame(proxied);
                }).catch(() => window.open(url, '_blank'));
            } else {
                window.open(url, '_blank');
            }
        }

        function launchProxiedTikTok() {
            const urls = ["https://www.tiktok.com", "https://www.tiktokv.com", "https://urlebird.com", "https://vt.tiktok.com"];
            let i = 0;
            const next = () => i < urls.length ? proxySite(urls[i++]) : alert("Try search bar");
            next();
        }

        function loadInternalGame(src) {
            document.getElementById('arcadeFrame').src = src;
            document.getElementById('gameViewport').style.display = 'block';
        }

        function closeGameEngine() {
            document.getElementById('arcadeFrame').src = "";
            document.getElementById('gameViewport').style.display = 'none';
        }

        function switchView(target) {
            closeGameEngine();
            document.querySelectorAll('.workspace-view, .arcade-view').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

            if(target === 'home') {
                document.getElementById('view-home-panel').style.display = 'flex';
                document.getElementById('nav-home').classList.add('active');
            } else if (target === 'cinema') {
                document.getElementById('view-cinema-panel').style.display = 'block';
                document.getElementById('nav-cinema').classList.add('active');
            } else if (target === 'arcade') {
                document.getElementById('view-arcade-panel').style.display = 'block';
                document.getElementById('nav-arcade').classList.add('active');
            }
        }

        function handleVaultSearch(event) {
            event.preventDefault();
            const input = document.getElementById('vaultSearchInput').value.trim();
            if (!input) return;
            let targetUrl = input;
            if (!/^https?:\/\//i.test(input)) targetUrl = 'https://' + input;
            proxySite(targetUrl);
        }

        window.onload = compileArcadeLibrary;
    </script>
</body>
</html>
