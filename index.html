<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarav's Vault — Web OS</title>
    <style>
        /* Root Settings & Theme Colors */
        :root {
            --sidebar-bg: rgba(20, 18, 24, 0.85);
            --sidebar-border: rgba(255, 255, 255, 0.05);
            --card-bg: rgba(25, 23, 30, 0.65);
            --card-hover: rgba(255, 255, 255, 0.1);
            --accent-color: #ff7b00; 
            --arcade-yellow: #facc15; /* Exact yellow button accent from screenshot */
            --text-main: #ffffff;
            --text-muted: #9aa0a6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            background: #000;
        }

        /* --- BACKGROUND LIVE WALLPAPER --- */
        .wallpaper-bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .wallpaper-bg-container iframe {
            width: 100vw;
            height: 56.25vw;
            min-height: 100vh;
            min-width: 177.77vh; 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: brightness(0.35) contrast(1.1);
        }

        /* --- SIDEBAR NAVIGATION (FIXED STACK WEIGHT) --- */
        aside {
            width: 260px;
            min-width: 260px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--sidebar-border);
            display: flex;
            flex-direction: column;
            padding: 25px 15px;
            z-index: 200; /* ALWAYS ON TOP OF GAMES AND PANELS */
            position: relative;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 35px;
            padding-left: 10px;
        }

        .brand-logo {
            font-size: 1.8rem;
            color: var(--accent-color);
            font-weight: bold;
        }

        .brand-title h1 {
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        .brand-title p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .nav-section {
            margin-bottom: 25px;
        }

        .section-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            padding-left: 10px;
            font-weight: 700;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            margin-bottom: 4px;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid var(--accent-color);
        }

        .sidebar-footer {
            margin-top: auto;
        }

        .btn-discord {
            display: block;
            text-align: center;
            background: rgba(88, 101, 242, 0.2);
            color: #5865F2;
            border: 1px solid rgba(88, 101, 242, 0.4);
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        /* --- STAGE COMPONENT CONTAINMENT --- */
        main {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .workspace-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 40px;
        }

        .hub-center {
            text-align: center;
            width: 100%;
            max-width: 650px;
            margin-bottom: 45px;
        }

        .widget-clock {
            font-size: 3.5rem;
            font-weight: 400;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .widget-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 35px;
        }

        .search-container {
            width: 100%;
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 6px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .search-container input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 1.05rem;
            padding: 10px;
        }

        .app-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 700px;
        }

        .app-tile {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 110px;
            height: 110px;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 8px;
        }

        .app-tile:hover {
            transform: translateY(-5px);
            background: var(--card-hover);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .app-icon { font-size: 2.2rem; }
        .app-name { font-size: 0.8rem; color: var(--text-muted); text-align: center; }

        /* --- HIGH PERFORMANCE CUSTOM ARCADE VAULT --- */
        .arcade-view {
            display: none; 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111116;
            background-image: 
                radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 0),
                radial-gradient(rgba(255, 255, 255, 0.02) 2px, transparent 0);
            background-size: 40px 40px, 80px 80px;
            padding: 40px;
            overflow-y: auto;
            z-index: 5;
        }

        .arcade-control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 4px solid #1a1a24;
            padding-bottom: 20px;
            position: relative;
        }

        .arcade-header-title h2 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .arcade-header-title h2 span {
            color: var(--arcade-yellow);
        }

        .moving-lines {
            position: absolute;
            bottom: -4px;
            left: 0;
            height: 4px;
            width: 180px;
            background: repeating-linear-gradient(
                90deg,
                var(--arcade-yellow),
                var(--arcade-yellow) 20px,
                #000 20px,
                #000 40px
            );
            animation: moveLines 1.2s linear infinite;
        }

        @keyframes moveLines {
            0% { background-position: 0px; }
            100% { background-position: 40px; }
        }

        .arcade-search {
            background: #16161f;
            border: 2px solid #222230;
            border-radius: 12px;
            padding: 10px 20px;
            width: 320px;
            color: white;
            outline: none;
            font-size: 0.95rem;
        }

        .arcade-search:focus {
            border-color: var(--arcade-yellow);
        }

        .arcade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin-bottom: 40px;
        }

        .game-card {
            background: #16161f;
            border: 2px solid #222230;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            height: 250px;
            transition: all 0.25s ease;
        }

        .game-card:hover {
            border-color: var(--arcade-yellow);
            box-shadow: 0 0 25px rgba(250, 204, 21, 0.1);
        }

        .game-thumbnail {
            width: 100%;
            height: 110px;
            border-radius: 10px;
            background: #0d0d11;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .game-card .title {
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .btn-play-action {
            background: #facc15;
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, background-color 0.2s;
        }

        .game-card:hover .btn-play-action {
            background: #fde047;
            transform: scale(1.02);
        }

        /* --- INTERIOR GAME SYSTEM VIEWPORT (FIXED POSITION MAPPING) --- */
        .game-player-frame {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100; /* Sits below Sidebar (200) but completely covers panel content */
        }

        .game-player-frame iframe {
            width: 100%;
            height: calc(100% - 40px);
            border: none;
            background: #000;
        }

        .game-control-bar {
            height: 40px;
            background: #0d0d11;
            border-top: 2px solid #1e1e2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
        }

        .embed-credit {
            font-size: 0.75rem;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .embed-credit span { color: var(--arcade-yellow); }

        .close-arcade-btn {
            background: transparent;
            color: #ef4444;
            border: none;
            cursor: pointer;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>

        function compileArcadeLibrary() {
            const grid = document.getElementById('dynamicArcadeGrid');
            grid.innerHTML = "";

            arcadeLibraryDatabase.forEach(game => {
                const embedTargetUrl = `https://the-pizza-edition-online.github.io/pages/${game.folder}.html`;
                
                const cardHTML = `
                    <div class="game-card" data-name="${game.name.toLowerCase()}">
                        <img class="game-thumbnail" src="${game.img}" onerror="this.src='https://the-pizza-edition-online.github.io/images/default.png';" alt="${game.name}">
                        <div class="title">${game.name}</div>
                        <button class="btn-play-action" onclick="loadGameEngine('${embedTargetUrl}')">Start Playing!</button>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        function filterArcadeLibrary() {
            const query = document.getElementById('arcadeSearchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.game-card');
            
            cards.forEach(card => {
                const name = card.getAttribute('data-name');
                if(name && name.includes(query)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        /* FIXED VIEWPORT ROUTER ENGINE */
        function switchView(target) {
            closeGameEngine();

            document.getElementById('view-home-panel').style.display = 'none';
            document.getElementById('view-cinema-panel').style.display = 'none';
            document.getElementById('view-arcade-panel').style.display = 'none';
            
            document.getElementById('nav-home').classList.remove('active');
            document.getElementById('nav-cinema').classList.remove('active');
            document.getElementById('nav-arcade').classList.remove('active');

            if(target === 'home') {
                document.getElementById('view-home-panel').style.display = 'flex';
                document.getElementById('nav-home').classList.add('active');
            } else if (target === 'cinema') {
                document.getElementById('view-cinema-panel').style.display = 'block';
                document.getElementById('nav-cinema').classList.add('active');
            } else if (target === 'arcade') {
                document.getElementById('view-arcade-panel').style.display = 'block';
                document.getElementById('nav-arcade').classList.add('active');
            }
        }

        function loadGameEngine(sourceUrl) {
            document.getElementById('arcadeFrame').src = sourceUrl;
            document.getElementById('gameViewport').style.display = 'block';
        }

        function closeGameEngine() {
            document.getElementById('arcadeFrame').src = "";
            document.getElementById('gameViewport').style.display = 'none';
        }

        function handleVaultSearch(event) {
            event.preventDefault();
            const input = document.getElementById('vaultSearchInput').value.trim();
            if (!input) return;

            const isUrl = input.match(/^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/) || input.startsWith('http');
            if (isUrl) {
                let finalUrl = input;
                if (!/^https?:\/\//i.test(input)) finalUrl = 'https://' + input;
                window.open(finalUrl, '_blank'); 
            } else {
                window.open('https://duckduckgo.com/?q=' + encodeURIComponent(input), '_blank');
            }
        }

        window.onload = compileArcadeLibrary;
    </script>
