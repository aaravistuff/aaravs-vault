<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarav's Vault</title>
    <style>
        /* Modern CSS Reset & Variables */
        :root {
            --bg-color: #0b0c10;
            --container-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-color: #6366f1; /* Electric Indigo */
            --accent-glow: rgba(99, 102, 241, 0.2);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glassmorphic Navbar */
        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav {
            display: flex;
            gap: 15px;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        nav a:hover, nav a.active {
            color: var(--text-main);
            background: var(--container-bg);
            border: 1px solid var(--border-color);
        }

        /* Centralized Search Section */
        .search-section {
            text-align: center;
            margin: 60px 20px 40px 20px;
            width: 100%;
            max-width: 600px;
        }

        .search-section h2 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 6px 10px;
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            padding: 12px;
            font-size: 1rem;
        }

        .search-box button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .search-box button:hover {
            opacity: 0.9;
        }

        /* Main Content Grids */
        .main-container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            box-sizing: border-box;
        }

        .content-heading {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 40px 0 20px 0;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .content-heading::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px;
        }

        /* Interactive Cards */
        .card {
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .card:hover {
            transform: translateY(-6px);
            border-color: var(--accent-color);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        .card-thumbnail {
            width: 100%;
            height: 140px;
            background: linear-gradient(135deg, #1e1b4b, #311042);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Standardized placeholder icon styling */
        .card-thumbnail::before {
            content: '🎮';
            font-size: 2rem;
            opacity: 0.4;
        }

        .movie-card .card-thumbnail::before {
            content: '🎬';
        }

        .card-info {
            padding: 16px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin: 0 0 4px 0;
        }

        .card-category {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Embed Container (Hidden by default, triggered when clicking a card) */
        .embed-wrapper {
            display: none;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin-top: 20px;
            overflow: hidden;
        }

        .embed-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">AARAV'S VAULT</div>
        <nav>
            <a href="#games" class="active">Games</a>
            <a href="#movies">Movies</a>
        </nav>
    </header>

    <div class="search-section">
        <h2>Uncover the Vault</h2>
        <form class="search-box" action="https://duckduckgo.com/" method="get" target="_blank">
            <input type="text" name="q" placeholder="Search the web securely...">
            <button type="submit">Search</button>
        </form>
    </div>

    <main class="main-container">

        <div class="embed-wrapper" id="vaultViewer">
            <iframe id="viewerFrame" src=""></iframe>
        </div>

        <div class="content-heading" id="games">Featured Games</div>
        <div class="grid">
            <div class="card" onclick="loadContent('https://play.pacman.com/')">
                <div class="card-thumbnail"></div>
                <div class="card-info">
                    <h3 class="card-title">Retro Arcade</h3>
                    <span class="card-category">Classic Game</span>
                </div>
            </div>
            <div class="card" onclick="loadContent('https://classic.minecraft.net/')">
                <div class="card-thumbnail"></div>
                <div class="card-info">
                    <h3 class="card-title">Voxel World</h3>
                    <span class="card-category">Sandbox Game</span>
                </div>
            </div>
        </div>

        <div class="content-heading" id="movies">Vault Movies & Media</div>
        <div class="grid">
            <div class="card movie-card" onclick="loadContent('https://www.youtube.com/embed/dQw4w9WgXcQ')">
                <div class="card-thumbnail"></div>
                <div class="card-info">
                    <h3 class="card-title">Trending Stream 1</h3>
                    <span class="card-category">Movie/Video</span>
                </div>
            </div>
        </div>

    </main>

    <script>
        function loadContent(url) {
            const viewer = document.getElementById('vaultViewer');
            const iframe = document.getElementById('viewerFrame');
            
            // Set the iframe source to the game or movie link
            iframe.src = url;
            // Display the embed block smoothly
            viewer.style.display = 'block';
            // Scroll smoothly to the game window
            viewer.scrollIntoView({ behavior: 'smooth' });
        }
    </script>

</body>
</html>
