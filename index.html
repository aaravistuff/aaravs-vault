<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarav's Vault — Web OS</title>
    <style>
        /* Root Settings & Theme Colors */
        :root {
            --sidebar-bg: rgba(20, 18, 24, 0.85);
            --sidebar-border: rgba(255, 255, 255, 0.05);
            --card-bg: rgba(25, 23, 30, 0.65);
            --card-hover: rgba(255, 255, 255, 0.1);
            --accent-color: #ff7b00; 
            --arcade-yellow: #facc15; 
            --text-main: #ffffff;
            --text-muted: #9aa0a6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            background: #000;
        }

        /* --- BACKGROUND LIVE WALLPAPER --- */
        .wallpaper-bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .wallpaper-bg-container iframe {
            width: 100vw;
            height: 56.25vw;
            min-height: 100vh;
            min-width: 177.77vh; 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: brightness(0.35) contrast(1.1);
        }

        /* --- SIDEBAR NAVIGATION (FIXED CLICK LAYER) --- */
        aside {
            width: 260px;
            min-width: 260px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--sidebar-border);
            display: flex;
            flex-direction: column;
            padding: 25px 15px;
            z-index: 100; /* FORCE SIDEBAR TO STAY ON TOP OF ALL PANELS */
            position: relative;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 35px;
            padding-left: 10px;
        }

        .brand-logo {
            font-size: 1.8rem;
            color: var(--accent-color);
            font-weight: bold;
        }

        .brand-title h1 {
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        .brand-title p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .nav-section {
            margin-bottom: 25px;
        }

        .section-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            padding-left: 10px;
            font-weight: 700;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            margin-bottom: 4px;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid var(--accent-color);
        }

        .sidebar-footer {
            margin-top: auto;
        }

        .btn-discord {
            display: block;
            text-align: center;
            background: rgba(88, 101, 242, 0.2);
            color: #5865F2;
            border: 1px solid rgba(88, 101, 242, 0.4);
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        /* --- STAGE VIEWPORT CONFIGURATION --- */
        main {
            flex: 1;
            position: relative;
            height: 100%;
        }

        /* Standardized view wrapping boundaries */
        .panel-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 40px;
            overflow-y: auto;
        }

        .workspace-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .hub-center {
            text-align: center;
            width: 100%;
            max-width: 650px;
            margin-bottom: 45px;
        }

        .widget-clock {
            font-size: 3.5rem;
            font-weight: 400;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .widget-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 35px;
        }

        .search-container {
            width: 100%;
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 6px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .search-container input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 1.05rem;
            padding: 10px;
        }

        .app-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 700px;
        }

        .app-tile {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 110px;
            height: 110px;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 8px;
        }

        .app-tile:hover {
            transform: translateY(-5px);
            background: var(--card-hover);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .app-icon { font-size: 2.2rem; }
        .app-name { font-size: 0.8rem; color: var(--text-muted); text-align: center; }

        /* --- ARCADE PANEL SPECIFICS --- */
        .arcade-view {
            display: none; 
            background: #111116;
            background-image: 
                radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 0),
                radial-gradient(rgba(255, 255, 255, 0.02) 2px, transparent 0);
            background-size: 40px 40px, 80px 80px;
            z-index: 5;
        }

        .arcade-control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 4px solid #1a1a24;
            padding-bottom: 20px;
            position: relative;
        }

        .arcade-header-title h2 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .arcade-header-title h2 span {
            color: var(--arcade-yellow);
        }

        .moving-lines {
            position: absolute;
            bottom: -4px;
            left: 0;
            height: 4px;
            width: 180px;
            background: repeating-linear-gradient(
                90deg,
                var(--arcade-yellow),
                var(--arcade-yellow) 20px,
                #000 20px,
                #000 40px
            );
            animation: moveLines 1.2s linear infinite;
        }

        @keyframes moveLines {
            0% { background-position: 0px; }
            100% { background-position: 40px; }
        }

        .arcade-search {
            background: #16161f;
            border: 2px solid #222230;
            border-radius: 12px;
            padding: 10px 20px;
            width: 320px;
            color: white;
            outline: none;
            font-size: 0.95rem;
        }

        .arcade-search:focus {
            border-color: var(--arcade-yellow);
        }

        .arcade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin-bottom: 40px;
        }

        .game-card {
            background: #16161f;
            border: 2px solid #222230;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            height: 255px;
            transition: all 0.25s ease;
        }

        .game-card:hover {
            border-color: var(--arcade-yellow);
            box-shadow: 0 0 25px rgba(250, 204, 21, 0.1);
        }

        .game-thumbnail {
            width: 100%;
            height: 120px;
            border-radius: 10px;
            background: #0d0d11;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.05);
            display: block;
        }

        .game-card .title {
            font-weight: 700;
            font-size: 0.95rem;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            margin-top: 2px;
        }

        .btn-play-action {
            background: #facc15;
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            width: 100%;
            margin-top: auto; 
            transition: transform 0.2s, background-color 0.2s;
        }

        .game-card:hover .btn-play-action {
            background: #fde047;
            transform: scale(1.02);
        }

        /* --- INTERIOR GAME SYSTEM STAGE --- */
        .game-player-frame {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 110; /* Sits perfectly right over the panels and navbar */
        }

        .game-player-frame iframe {
            width: 100%;
            height: calc(100% - 40px);
            border: none;
            background: #000;
        }

        .game-control-bar {
            height: 40px;
            background: #0d0d11;
            border-top: 2px solid #1e1e2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
        }

        .embed-credit {
            font-size: 0.75rem;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .embed-credit span { color: var(--arcade-yellow); }

        .close-arcade-btn {
            background: transparent;
            color: #ef4444;
            border: none;
            cursor: pointer;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="wallpaper-bg-container">
        <iframe src="https://www.youtube.com/embed/fKcF32dmcDk?autoplay=1&mute=1&loop=1&playlist=fKcF32dmcDk&controls=0&showinfo=0&rel=0&iv_load_policy=3&modestbranding=1&enablejsapi=1" allow="autoplay; encrypted-media" frameborder="0"></iframe>
    </div>

    <aside>
        <div class="brand">
            <div class="brand-logo">V</div>
            <div class="brand-title">
                <h1>Vault OS</h1>
                <p>Aarav's Hub</p>
            </div>
        </div>

        <div class="nav-section">
            <div class="section-label">Navigation</div>
            <div onclick="switchView('home')" id="nav-home" class="nav-item active"><span>🏠</span> Home Workspace</div>
            <div onclick="switchView('cinema')" id="nav-cinema" class="nav-item"><span>🎬</span> Cinema Hub</div>
            <div onclick="switchView('arcade')" id="nav-arcade" class="nav-item"><span>🕹️</span> Arcade Vault</div>
        </div>

        <div class="sidebar-footer">
            <a href="https://discord.com" target="_blank" class="btn-discord">Join Discord</a>
        </div>
    </aside>

    <main>
        
        <div class="game-player-frame" id="gameViewport">
            <iframe id="arcadeFrame" src=""></iframe>
            <div class="game-control-bar">
                <div class="embed-credit">Arcade Vault // <span>Live Viewport Active</span></div>
                <button class="close-arcade-btn" onclick="closeGameEngine()">✕ Exit Arcade</button>
            </div>
        </div>

        <div class="panel-container workspace-view" id="view-home-panel">
            <div class="hub-center">
                <div class="widget-clock" id="liveClock">Welcome</div>
                <div class="widget-subtitle">Your cinematic web dashboard portal</div>
                <form class="search-container" id="vaultSearchForm" onsubmit="handleVaultSearch(event)">
                    <input type="text" id="vaultSearchInput" placeholder="Search the web or enter a URL...">
                </form>
            </div>

            <div class="app-grid">
                <a href="https://www.youtube.com" target="_blank" class="app-tile">
                    <div class="app-icon">📺</div><div class="app-name">YouTube</div>
                </a>
                <a href="https://www.tiktok.com" target="_blank" class="app-tile">
                    <div class="app-icon">🎵</div><div class="app-name">TikTok</div>
                </a>
                <a href="https://www.discord.com" target="_blank" class="app-tile">
                    <div class="app-icon">💬</div><div class="app-name">Discord</div>
                </a>
                <a href="https://www.google.com" target="_blank" class="app-tile">
                    <div class="app-icon">🔍</div><div class="app-name">Google</div>
                </a>
                <a href="https://www.twitch.tv" target="_blank" class="app-tile">
                    <div class="app-icon">🔮</div><div class="app-name">Twitch</div>
                </a>
            </div>
        </div>

        <div class="panel-container arcade-view" id="view-cinema-panel">
            <div class="arcade-control-header">
                <div class="arcade-header-title">
                    <h2>Cinema Hub Streaming</h2>
                    <div class="moving-lines"></div>
                </div>
            </div>
            <div class="arcade-grid">
                <a href="https://dulo.tv" target="_blank" style="text-decoration: none;">
                    <div class="game-card" style="height: 180px;">
                        <div class="title" style="font-size: 1.5rem;">🎬 DULO TV</div>
                        <button class="btn-play-action">Launch TV Stream</button>
                    </div>
                </a>
            </div>
        </div>

        <div class="panel-container arcade-view" id="view-arcade-panel">
            <div class="arcade-control-header">
                <div class="arcade-header-title">
                    <h2>THE <span>ARCADE VAULT</span></h2>
                    <div class="moving-lines"></div>
                </div>
                <input type="text" class="arcade-search" id="arcadeSearchInput" placeholder="Search hundreds of games instantly..." oninput="filterArcadeLibrary()">
            </div>
            
            <div class="arcade-grid" id="dynamicArcadeGrid"></div>
        </div>

    </main>

    <script>
        // System Clock Track
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        document.getElementById('liveClock').innerText = days[new Date().getDay()];

        // CDN Game Database Repository
        const arcadeLibraryDatabase = [
            { name: "Retro Bowl", url: "https://retrobowlgame.org/retro-bowl.embed", img: "https://images.unsplash.com/photo-1587280501635-68a0e82cd5ff?w=400&auto=format&fit=crop&q=60" },
            { name: "Slope 3D", url: "https://slopegame.online/slope-game.embed", img: "https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?w=400&auto=format&fit=crop&q=60" },
            { name: "BitLife Sim", url: "https://bitlifeonline.com/bitlife.embed", img: "https://images.unsplash.com/photo-1434030216411-0b793f4b4173?w=400&auto=format&fit=crop&q=60" },
            { name: "Geometry Dash", url: "https://geometrydash.io/geometry-dash.embed", img: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=400&auto=format&fit=crop&q=60" },
            { name: "1v1.LOL", url: "https://1v1.lol/", img: "https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400&auto=format&fit=crop&q=60" },
            { name: "Tunnel Rush", url: "https://slopegame.online/slope-game.embed", img: "https://images.unsplash.com/photo-1509198397868-475647b2a1e5?w=400&auto=format&fit=crop&q=60" },
            { name: "Drive Mad", url: "https://classic.minecraft.net/", img: "https://images.unsplash.com/photo-1511512578047-dfb367046420?w=400&auto=format&fit=crop&q=60" },
            { name: "Cookie Clicker", url: "https://cookie-clicker2.github.io/", img: "https://images.unsplash.com/photo-1558961312-50a5f802d33d?w=400&auto=format&fit=crop&q=60" },
            { name: "Minecraft Classic", url: "https://classic.minecraft.net/", img: "https://images.unsplash.com/photo-1605899435973-ca2d1a8861cf?w=400&auto=format&fit=crop&q=60" },
            { name: "Subway Surfers", url: "https://subway-surfers.org/subway-surfers.embed", img: "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=400&auto=format&fit=crop&q=60" },
            { name: "Smash Karts", url: "https://smashkarts.io/", img: "https://images.unsplash.com/photo-1593305841991-05c297ba4575?w=400&auto=format&fit=crop&q=60" },
            { name: "Happy Wheels", url: "https://happywheels.org/happy-wheels.embed", img: "https://images.unsplash.com/photo-1534447677768-be436bb09401?w=400&auto=format&fit=crop&q=60" },
            { name: "Pac-Man Classic", url: "https://play.pacman.com/", img: "https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?w=400&auto=format&fit=crop&q=60" },
            { name: "HaxBall", url: "https://haxball.com/", img: "https://images.unsplash.com/photo-1508098682722-e99c43a406b2?w=400&auto=format&fit=crop&q=60" },
            { name: "Drift Hunters", url: "https://drift-hunters.io/drift-hunters.embed", img: "https://images.unsplash.com/photo-1616422285623-13ff0162193c?w=400&auto=format&fit=crop&q=60" },
            { name: "Friday Night Funkin'", url: "https://v6p9d9t4.ssl.hwcdn.net/html/1907406/index.html", img: "https://images.unsplash.com/photo-1516280440614-37939bbacd6a?w=400&auto=format&fit=crop&q=60" },
            { name: "Shell Shockers", url: "https://shellshock.io/", img: "https://images.unsplash.com/photo-1516116211223-5c359a36298a?w=400&auto=format&fit=crop&q=60" },
            { name: "Just Fall.LOL", url: "https://justfall.lol/", img: "https://images.unsplash.com/photo-1627856013091-fed6e4e30025?w=400&auto=format&fit=crop&q=60" },
            { name: "Zombs Royale", url: "https://zombsroyale.io/", img: "https://images.unsplash.com/photo-1538481199705-c710c4e965fc?w=400&auto=format&fit=crop&q=60" },
            { name: "BuildNow GG", url: "https://buildnow.gg/", img: "https://images.unsplash.com/photo-1612287230202-1bf1d85d1bdf?w=400&auto=format&fit=crop&q=60" }
        ];

        // Bulk Generator Engine
        function compileArcadeLibrary() {
            const grid = document.getElementById('dynamicArcadeGrid');
            grid.innerHTML = "";

            arcadeLibraryDatabase.forEach(game => {
                const cardHTML = `
                    <div class="game-card" data-name="${game.name.toLowerCase()}">
                        <img class="game-thumbnail" src="${game.img}" onerror="this.src='https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=400';" alt="${game.name}">
                        <div class="title">${game.name}</div>
                        <button class="btn-play-action" onclick="loadGameEngine('${game.url}')">Start Playing!</button>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // Search Filters Engine
        function filterArcadeLibrary() {
            const query = document.getElementById('arcadeSearchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.game-card');
            
            cards.forEach(card => {
                const name = card.getAttribute('data-name');
                if(name && name.includes(query)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // Layout View Swapper Engine (Fixed panel swapping logic)
        function switchView(target) {
            document.getElementById('view-home-panel').style.display = 'none';
            document.getElementById('view-cinema-panel').style.display = 'none';
            document.getElementById('view-arcade-panel').style.display = 'none';
            
            document.getElementById('nav-home').classList.remove('active');
            document.getElementById('nav-cinema').classList.remove('active');
            document.getElementById('nav-arcade').classList.remove('active');

            if(target === 'home') {
                document.getElementById('view-home-panel').style.display = 'flex';
                document.getElementById('nav-home').classList.add('active');
            } else if (target === 'cinema') {
                document.getElementById('view-cinema-panel').style.display = 'block';
                document.getElementById('nav-cinema').classList.add('active');
            } else if (target === 'arcade') {
                document.getElementById('view-arcade-panel').style.display = 'block';
                document.getElementById('nav-arcade').classList.add('active');
            }
        }

        // Open/Close Embedded Iframe Layer
        function loadGameEngine(sourceUrl) {
            document.getElementById('arcadeFrame').src = sourceUrl;
            document.getElementById('gameViewport').style.display = 'block';
        }

        function closeGameEngine() {
            document.getElementById('arcadeFrame').src = "";
            document.getElementById('gameViewport').style.display = 'none';
        }

        // Search Input Logic Parser
        function handleVaultSearch(event) {
            event.preventDefault();
            const input = document.getElementById('vaultSearchInput').value.trim();
            if (!input) return;

            const isUrl = input.match(/^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/) || input.startsWith('http');
            if (isUrl) {
                let finalUrl = input;
                if (!/^https?:\/\//i.test(input)) finalUrl = 'https://' + input;
                window.open(finalUrl, '_blank'); 
            } else {
                window.open('https://duckduckgo.com/?q=' + encodeURIComponent(input), '_blank');
            }
        }

        window.onload = compileArcadeLibrary;
    </script>
</body>
</html>
