<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarav's Vault — Web OS</title>
    <style>
        /* Root Settings & Theme Colors */
        :root {
            --sidebar-bg: rgba(20, 18, 24, 0.75);
            --sidebar-border: rgba(255, 255, 255, 0.05);
            --card-bg: rgba(25, 23, 30, 0.6);
            --card-hover: rgba(255, 255, 255, 0.08);
            --accent-color: #ff7b00; /* Warm orange accent from the photo */
            --text-main: #ffffff;
            --text-muted: #9aa0a6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1920') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- LEFT SIDEBAR --- */
        aside {
            width: 260px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-right: 1px solid var(--sidebar-border);
            display: flex;
            flex-direction: column;
            padding: 25px 15px;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 35px;
            padding-left: 10px;
        }

        .brand-logo {
            font-size: 1.8rem;
            color: var(--accent-color);
            font-weight: bold;
        }

        .brand-title h1 {
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        .brand-title p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .nav-section {
            margin-bottom: 25px;
        }

        .section-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            padding-left: 10px;
            font-weight: 700;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            margin-bottom: 4px;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid var(--accent-color);
        }

        .sidebar-footer {
            margin-top: auto;
        }

        .btn-discord {
            display: block;
            text-align: center;
            background: rgba(88, 101, 242, 0.2);
            color: #5865F2;
            border: 1px solid rgba(88, 101, 242, 0.4);
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .btn-discord:hover {
            background: rgba(88, 101, 242, 0.3);
        }

        /* --- MAIN DESKTOP AREA --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
            background: rgba(0, 0, 0, 0.2); /* Dark overlay to pop elements */
        }

        /* Center Hub Content */
        .hub-center {
            text-align: center;
            width: 100%;
            max-width: 650px;
            margin-bottom: 40px;
        }

        .widget-clock {
            font-size: 3rem;
            font-weight: 400;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .widget-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        /* Search Bar Pill */
        .search-container {
            width: 100%;
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 6px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .search-container input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 1.05rem;
            padding: 10px;
        }

        /* Category Filter Pills */
        .categories {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
        }

        .pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-main);
        }

        .pill:hover, .pill.active {
            background: var(--accent-color);
            color: black;
            font-weight: 600;
        }

        /* App Grid Shortcuts */
        .app-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 900px;
        }

        .app-tile {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 100px;
            height: 100px;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 8px;
        }

        .app-tile:hover {
            transform: translateY(-5px);
            background: var(--card-hover);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .app-icon {
            font-size: 1.8rem;
        }

        .app-name {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .app-tile:hover .app-name {
            color: white;
        }
    </style>
</head>
<body>

    <aside>
        <div class="brand">
            <div class="brand-logo">V</div>
            <div class="brand-title">
                <h1>Vault OS</h1>
                <p>Aarav's Hub</p>
            </div>
        </div>

        <div class="nav-section">
            <div class="section-label">Entertainment</div>
            <a href="#" class="nav-item active"><span>🏠</span> Home</a>
            <a href="#" class="nav-item"><span>🎬</span> Cinema</a>
            <a href="#" class="nav-item"><span>🎮</span> Games</a>
            <a href="#" class="nav-item"><span>🕹️</span> Emulator</a>
        </div>

        <div class="nav-section">
            <div class="section-label">Tools</div>
            <a href="#" class="nav-item"><span>🌐</span> Browser Proxy</a>
        </div>

        <div class="sidebar-footer">
            <a href="#" class="btn-discord">Join Discord</a>
        </div>
    </aside>

    <main>
        
        <div class="hub-center">
            <div class="widget-clock" id="liveClock">Welcome Back</div>
            <div class="widget-subtitle">Your cinematic web dashboard portal</div>

            <form class="search-container" action="https://duckduckgo.com/" method="get" target="_blank">
                <input type="text" name="q" placeholder="Search the web or enter a URL...">
            </form>

            <div class="categories">
                <div class="pill active">Popular</div>
                <div class="pill">Games</div>
                <div class="pill">Media</div>
                <div class="pill">Apps</div>
            </div>
        </div>

        <div class="app-grid">
            <a href="https://youtube.com" target="_blank" class="app-tile">
                <div class="app-icon">📺</div>
                <div class="app-name">YouTube</div>
            </a>
            <a href="https://reddit.com" target="_blank" class="app-tile">
                <div class="app-icon">🤖</div>
                <div class="app-name">Reddit</div>
            </a>
            <a href="https://google.com" target="_blank" class="app-tile">
                <div class="app-icon">🔍</div>
                <div class="app-name">Google</div>
            </a>
            <a href="https://spotify.com" target="_blank" class="app-tile">
                <div class="app-icon">🎵</div>
                <div class="app-name">Spotify</div>
            </a>
            <a href="https://discord.com" target="_blank" class="app-tile">
                <div class="app-icon">💬</div>
                <div class="app-name">Discord</div>
            </a>
        </div>

    </main>

    <script>
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const currentDay = days[new Date().getDay()];
        document.getElementById('liveClock').innerText = currentDay;
    </script>
</body>
</html>
